name: CD

on:
  release:
    types: [published]
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'staging'
        type: choice
        options:
          - production
          - staging

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:
  # ============================================
  # Prepare deployment metadata
  # ============================================
  prepare:
    name: Prepare Deployment
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      environment: ${{ steps.env.outputs.environment }}
      sha_short: ${{ steps.sha.outputs.sha_short }}
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            echo "version=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "version=sha-${GITHUB_SHA::8}" >> $GITHUB_OUTPUT
          fi

      - name: Determine environment
        id: env
        run: |
          if [[ "${{ github.event.inputs.environment }}" != "" ]]; then
            echo "environment=${{ github.event.inputs.environment }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.event_name }}" == "release" ]]; then
            echo "environment=production" >> $GITHUB_OUTPUT
          else
            echo "environment=staging" >> $GITHUB_OUTPUT
          fi

      - name: Get short SHA
        id: sha
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

  # ============================================
  # Build and push backend Docker image
  # ============================================
  build-backend:
    name: Build Backend Image
    runs-on: ubuntu-latest
    needs: prepare
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.image.outputs.image }}
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.event_name == 'release' }}
            type=raw,value=${{ needs.prepare.outputs.environment }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile.prod
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ needs.prepare.outputs.version }}
            COMMIT_SHA=${{ needs.prepare.outputs.sha_short }}

      - name: Output image
        id: image
        run: |
          echo "image=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend:${{ needs.prepare.outputs.version }}" >> $GITHUB_OUTPUT

  # ============================================
  # Build and push frontend Docker image
  # ============================================
  build-frontend:
    name: Build Frontend Image
    runs-on: ubuntu-latest
    needs: prepare
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.image.outputs.image }}
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.event_name == 'release' }}
            type=raw,value=${{ needs.prepare.outputs.environment }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile.prod
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ needs.prepare.outputs.version }}
            VITE_API_URL=${{ vars.VITE_API_URL }}

      - name: Output image
        id: image
        run: |
          echo "image=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend:${{ needs.prepare.outputs.version }}" >> $GITHUB_OUTPUT

  # ============================================
  # Deploy to Railway
  # ============================================
  deploy-railway:
    name: Deploy to Railway
    # Migrations must run BEFORE deployment so the new app code never starts
    # against an old DB schema (which would crash on missing columns/FKs).
    runs-on: ubuntu-latest
    needs: [prepare, build-backend, build-frontend, run-migrations]
    environment:
      name: ${{ needs.prepare.outputs.environment }}
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy Backend to Railway
        id: deploy-backend
        run: |
          cd backend
          railway up --service backend --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        continue-on-error: false

      - name: Deploy Frontend to Railway
        id: deploy-frontend
        run: |
          cd frontend
          railway up --service frontend --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        continue-on-error: false

      - name: Output deployment URL
        id: deploy
        run: |
          echo "url=https://autocognitix.up.railway.app" >> $GITHUB_OUTPUT

  # ============================================
  # Run Database Migrations
  # ============================================
  run-migrations:
    name: Run Migrations
    runs-on: ubuntu-latest
    # Runs BEFORE deploy-railway — see the deploy-railway job's comment for why.
    needs: [prepare, build-backend]
    environment: ${{ needs.prepare.outputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install alembic asyncpg sqlalchemy psycopg2-binary

      - name: Run Alembic migrations
        run: |
          cd backend
          alembic upgrade head
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        continue-on-error: false

  # ============================================
  # Smoke Tests after deployment
  # Non-blocking during early development
  # ============================================
  smoke-tests:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: [prepare, deploy-railway, run-migrations]
    environment: ${{ needs.prepare.outputs.environment }}
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Validate deployment variables
        run: |
          if [ -z "${{ vars.API_URL }}" ]; then echo "::warning::API_URL not set, skipping smoke tests"; exit 0; fi
          if [ -z "${{ vars.FRONTEND_URL }}" ]; then echo "::warning::FRONTEND_URL not set, skipping smoke tests"; exit 0; fi

      - name: Wait for deployment to be ready
        run: sleep 30

      - name: Health check - Backend
        run: |
          for i in {1..10}; do
            status=$(curl -s -o /dev/null -w "%{http_code}" "${{ vars.API_URL }}/health" || echo "000")
            if [ "$status" == "200" ]; then
              echo "Backend is healthy!"
              exit 0
            fi
            echo "Attempt $i: Backend returned $status, waiting..."
            sleep 10
          done
          echo "Backend health check did not succeed after 10 attempts (may still be starting)"
        continue-on-error: true

      - name: Health check - Frontend
        run: |
          for i in {1..10}; do
            status=$(curl -s -o /dev/null -w "%{http_code}" "${{ vars.FRONTEND_URL }}" || echo "000")
            if [ "$status" == "200" ]; then
              echo "Frontend is healthy!"
              exit 0
            fi
            echo "Attempt $i: Frontend returned $status, waiting..."
            sleep 10
          done
          echo "Frontend health check did not succeed after 10 attempts (may still be starting)"
        continue-on-error: true

      - name: API endpoint tests
        run: |
          # Test API version endpoint
          curl -sf "${{ vars.API_URL }}/api/v1/health" || echo "API health endpoint check failed (non-blocking)"

          # Test DTC search endpoint (should return 200 even without results)
          curl -sf "${{ vars.API_URL }}/api/v1/dtc/search?q=P0001" || echo "DTC search endpoint check failed (non-blocking)"
        continue-on-error: true

  # ============================================
  # Notify deployment status
  # ============================================
  notify:
    name: Notify Status
    runs-on: ubuntu-latest
    needs: [prepare, build-backend, build-frontend, deploy-railway, smoke-tests]
    if: always()
    steps:
      - name: Deployment Summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Version | ${{ needs.prepare.outputs.version }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | ${{ needs.prepare.outputs.environment }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | ${{ needs.prepare.outputs.sha_short }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Backend Build | ${{ needs.build-backend.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend Build | ${{ needs.build-frontend.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Deploy | ${{ needs.deploy-railway.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Smoke Tests | ${{ needs.smoke-tests.result }} |" >> $GITHUB_STEP_SUMMARY

      - name: Check overall status
        run: |
          # During early development, don't fail the workflow on smoke test issues
          if [ "${{ needs.build-backend.result }}" == "success" ] && \
             [ "${{ needs.build-frontend.result }}" == "success" ] && \
             [ "${{ needs.deploy-railway.result }}" == "success" ]; then
            echo "Deployment completed!"
            if [ "${{ needs.smoke-tests.result }}" != "success" ]; then
              echo "Note: Smoke tests had issues - services may need time to start"
            fi
          else
            echo "Deployment had issues. Check the logs for details."
          fi
          # Don't exit with error during early development
          exit 0

  # ============================================
  # Rollback on failure: opens an issue for build, migration, and deploy
  # failures (incl. deploy failure after successful migration = schema drift)
  # ============================================
  rollback:
    name: Rollback Deployment
    runs-on: ubuntu-latest
    # The issue-creation step needs explicit write permission; without it the
    # API call 403s and the schema-drift warning is silently lost.
    permissions:
      issues: write
    # deploy-railway and run-migrations MUST be listed in needs, otherwise their
    # results are not readable from this job's `if` expression.
    needs: [prepare, build-backend, build-frontend, run-migrations, deploy-railway, smoke-tests]
    # always() is required: with plain failure(), a build failure would skip the
    # downstream jobs and this job's needs would never be satisfied as "failed
    # only". always() + explicit result checks covers every failure combination:
    # build failure, migration failure, and deploy failure after a successful
    # migration (skipped jobs evaluate to 'skipped' and don't trigger rollback).
    if: >-
      always() &&
      (needs.build-backend.result == 'failure' ||
       needs.build-frontend.result == 'failure' ||
       needs.run-migrations.result == 'failure' ||
       needs.deploy-railway.result == 'failure')
    environment: ${{ needs.prepare.outputs.environment }}
    steps:
      - name: Get previous version
        id: previous
        run: |
          # This would typically query Railway or your registry for the previous version
          echo "Rollback would be triggered here"
          echo "Manual intervention required for rollback"

      - name: Create rollback issue
        uses: actions/github-script@v7
        env:
          BUILD_BACKEND_RESULT: ${{ needs.build-backend.result }}
          BUILD_FRONTEND_RESULT: ${{ needs.build-frontend.result }}
          MIGRATIONS_RESULT: ${{ needs.run-migrations.result }}
          DEPLOY_RESULT: ${{ needs.deploy-railway.result }}
          DEPLOY_VERSION: ${{ needs.prepare.outputs.version }}
          DEPLOY_ENVIRONMENT: ${{ needs.prepare.outputs.environment }}
        with:
          script: |
            const buildBackend = process.env.BUILD_BACKEND_RESULT;
            const buildFrontend = process.env.BUILD_FRONTEND_RESULT;
            const migrations = process.env.MIGRATIONS_RESULT;
            const deploy = process.env.DEPLOY_RESULT;
            const shortSha = context.sha.substring(0, 8);

            const meta = [
              `- **Version:** ${process.env.DEPLOY_VERSION}`,
              `- **Environment:** ${process.env.DEPLOY_ENVIRONMENT}`,
              `- **Commit:** ${context.sha}`,
              `- **Backend build:** ${buildBackend}`,
              `- **Frontend build:** ${buildFrontend}`,
              `- **Migrations:** ${migrations}`,
              `- **Deploy:** ${deploy}`,
            ].join('\n');

            let title;
            let details;
            let labels = ['deployment'];

            if (buildBackend === 'failure' || buildFrontend === 'failure') {
              title = `Build Failed - Deployment Blocked (${shortSha})`;
              details = 'Docker build failed. Migrations and deployment were not attempted.';
              labels.push('build-failure');
            } else if (migrations === 'failure') {
              title = `Migration Failed - Deployment Blocked (${shortSha})`;
              details = 'Alembic migration failed. Deployment was not attempted, ' +
                'the running app and DB schema are still consistent (old version). ' +
                'Investigate the migration before retrying.';
              labels.push('migration-failure');
            } else if (deploy === 'failure' && migrations === 'success') {
              title = `Deploy Failed AFTER Successful Migration (${shortSha})`;
              details = '**WARNING: DB schema is ahead of running code** — migrations ' +
                'succeeded but the Railway deploy failed, so the OLD app version is ' +
                'running against the NEW schema. Consider `alembic downgrade -1` to ' +
                'restore schema compatibility, or fast-forward redeploy the new app ' +
                'version as soon as possible.';
              labels.push('deploy-failure', 'schema-drift');
            } else {
              title = `Deploy Failed (${shortSha})`;
              details = 'Railway deploy failed. Check the workflow logs for details.';
              labels.push('deploy-failure');
            }

            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body: `## Deployment Failure\n\n${meta}\n\n${details}\n\n[View Workflow Run](${runUrl})`,
              labels,
            });
        continue-on-error: true
