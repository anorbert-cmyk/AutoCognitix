name: Scheduled Backup

on:
  schedule:
    # Run daily at 3:00 AM UTC
    - cron: '0 3 * * *'
  workflow_dispatch:  # Allow manual trigger

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install asyncpg neo4j qdrant-client

      - name: Run backup
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEO4J_URI: ${{ secrets.NEO4J_URI }}
          NEO4J_PASSWORD: ${{ secrets.NEO4J_PASSWORD }}
          QDRANT_URL: ${{ secrets.QDRANT_URL }}
          QDRANT_API_KEY: ${{ secrets.QDRANT_API_KEY }}
        run: |
          python scripts/backup_data.py --all --output-dir ./backups

      - name: Verify backup integrity
        run: |
          echo "Checking backup output..."
          ls -la ./backups/
          file_count=$(find ./backups/ -type f | wc -l)
          if [ "$file_count" -eq 0 ]; then
            echo "::error::No backup files produced!"
            exit 1
          fi
          for f in ./backups/*; do
            if [ ! -s "$f" ]; then
              echo "::error::Empty backup file: $f"
              exit 1
            fi
          done
          echo "Backup verification passed: $file_count files"

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: backup-${{ github.run_id }}
          path: ./backups/
          retention-days: 30

      - name: Notify on failure
        if: failure()
        run: echo "::error::Backup failed! Check logs for details."
